name: Docker - main branch

on:
  push:
    branches:
      - "main"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build docker image
    runs-on: [self-hosted, rust-builder]
    env:
      BRANCH: ${{ github.head_ref || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: ./scripts/build_images.bash
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-west-2
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - name: ECR Push
        run: ./scripts/ecr-private-push.bash login
      - name: Clean up
        run: podman image prune -f

  deploy:
    name: Deploy to EKS
    needs: build
    runs-on: [self-hosted, rust-builder]
    env:
      ECR: 311141552572.dkr.ecr.us-west-2.amazonaws.com
      COMMIT: ${{ github.sha }}
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-west-2
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name app-cluster-v2 --region us-west-2
      - name: Wait for EKS API
        run: |
          probe_resource="statefulset/flow-server"
          for i in $(seq 1 20); do
            if kubectl get "$probe_resource" -n default --request-timeout=20s >/dev/null 2>&1; then
              echo "EKS API reachable."
              exit 0
            fi
            echo "EKS API not reachable yet (attempt $i/20); retrying in 15s..."
            sleep 15
          done
          kubectl get "$probe_resource" -n default --request-timeout=20s
      - name: Deploy pinned commit images
        run: |
          retry() {
            local attempts="$1"
            shift
            local n=1
            until "$@"; do
              if [ "$n" -ge "$attempts" ]; then
                return 1
              fi
              echo "Attempt $n/$attempts failed: $*"
              n=$((n + 1))
              sleep 10
            done
          }

          retry 5 kubectl set image statefulset/flow-server flow-server=$ECR/flow-server:$COMMIT
          retry 5 kubectl set image statefulset/deno-server deno-server=$ECR/cmds-server:$COMMIT init=$ECR/cmds-server:$COMMIT
          retry 5 kubectl set image deployment/schema-server schema-server=$ECR/schema-server:$COMMIT

          retry 5 kubectl rollout status statefulset/flow-server --timeout=10m
          retry 5 kubectl rollout status statefulset/deno-server --timeout=10m
          retry 5 kubectl rollout status deployment/schema-server --timeout=10m

  integration-test:
    name: Integration Test
    needs: deploy
    runs-on: [self-hosted, rust-builder]
    env:
      APIKEY: ${{ secrets.INTEGRATION_TESTS_APIKEY }}
      KEYPAIR: ${{ secrets.INTEGRATION_TESTS_KEYPAIR }}
      USDC_KEYPAIR: ${{ secrets.USDC_KEYPAIR }}
      SOLANA_DEVNET_URL: ${{ secrets.SOLANA_DEVNET_URL }}
    steps:
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: default
          override: true
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Install deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Build Integration Tests
        run: cargo build --bin integration-tests --quiet
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-west-2
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - name: Run Integration Tests
        env:
          APIKEY: ${{ secrets.INTEGRATION_TESTS_APIKEY }}
          KEYPAIR: ${{ secrets.INTEGRATION_TESTS_KEYPAIR }}
        run: cargo run --bin integration-tests --quiet
