name: Client Next Browser

on:
  workflow_dispatch:
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/client-next-browser.yaml"
      - "@space-operator/client-next/**"
      - "@space-operator/contracts/**"
      - "@space-operator/x402-fetch/**"
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/client-next-browser.yaml"
      - "@space-operator/client-next/**"
      - "@space-operator/contracts/**"
      - "@space-operator/x402-fetch/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  client-next-browser-smoke:
    name: client-next browser smoke
    runs-on: [self-hosted, rust-builder]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.3

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 2.6.4

      - name: Install Bun workspace deps
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        run: cd @space-operator/client-next && deno task setup:playwright

      - name: Run browser smoke suite
        run: cd @space-operator/client-next && deno task test:playwright:ci
