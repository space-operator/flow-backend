name: Docker

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build docker image
    if: contains(github.event.pull_request.labels.*.name, 'docker')
    runs-on: [self-hosted, rust-builder]
    env:
      BRANCH: ${{ github.head_ref || github.ref_name }}
      PROFILE: dev
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: ./scripts/build_images.bash
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-west-2
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - name: ECR Push
        run: ./scripts/ecr-private-push.bash login
      - name: Clean up
        run: podman image prune -f

  integration-test:
    name: Integration Test
    if: ${{ contains(github.event.pull_request.labels.*.name, 'integration-test') }}
    needs: build
    runs-on: [self-hosted, rust-builder]
    env:
      APIKEY: ${{ secrets.INTEGRATION_TESTS_APIKEY }}
      KEYPAIR: ${{ secrets.INTEGRATION_TESTS_KEYPAIR }}
      USDC_KEYPAIR: ${{ secrets.USDC_KEYPAIR }}
      SOLANA_DEVNET_URL: ${{ secrets.SOLANA_DEVNET_URL }}
    steps:
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: default
          override: true
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Install deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Build Integration Tests
        run: cargo build --bin integration-tests --quiet

      - name: Run Integration Tests
        env:
          APIKEY: ${{ secrets.INTEGRATION_TESTS_APIKEY }}
          KEYPAIR: ${{ secrets.INTEGRATION_TESTS_KEYPAIR }}
        run: cargo run --bin integration-tests --quiet
