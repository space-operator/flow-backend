name: Rust

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-test:
    if: ${{ ! contains(github.event.pull_request.labels.*.name, 'no-test') }}
    name: Unit test
    runs-on: [self-hosted, rust-builder]
    permissions:
      checks: write
      contents: read
    env:
      SOLANA_DEVNET_URL: ${{ secrets.SOLANA_DEVNET_URL }}
    steps:
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: default
          override: true
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
#      - uses: actions-rs/clippy-check@v1
#        with:
#          token: ${{ secrets.GITHUB_TOKEN }}
#          args: --quiet --tests --
      - run: >
          cargo clippy --quiet --tests --
          -D clippy::dbg_macro
          -D clippy::print_stdout
          -D clippy::print_stderr
          -D clippy::await_holding_refcell_ref
          -D clippy::await_holding_lock
      - name: Assert Cargo.lock unchanged
        run: .github/assert_cargo_lock_unchanged.bash
      - name: Build tests
        run: cargo test --quiet --no-run
      - name: Install deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Run tests
        run: cargo test -- --skip need_key_
      - name: cargo fmt
        run: cargo fmt --check 
  benchmark-pr:
    name: Benchmark PR
    needs: unit-test
    # DO NOT REMOVE: For handling Fork PRs see Pull Requests from Forks
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && contains(github.event.pull_request.labels.*.name, 'benchmark')
    permissions:
      pull-requests: write
    runs-on: [self-hosted, rust-builder]
    steps:
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: default
          override: true
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - uses: bencherdev/bencher@main
      - name: Run benchmark
        run: >
          bencher run
          --project backend-e9b5559-25k6lbjiv95d0
          --token '${{ secrets.BENCHER_API_TOKEN }}'
          --branch "$GITHUB_HEAD_REF"
          --start-point "$GITHUB_BASE_REF"
          --start-point-hash '${{ github.event.pull_request.base.sha }}'
          --start-point-clone-thresholds
          --start-point-reset
          --testbed hetzner-r3600
          --err
          --adapter rust_criterion
          --github-actions '${{ secrets.GITHUB_TOKEN }}'
          cargo bench
  benchmark_main:
    name: Benchmark main
    needs: unit-test
    # DO NOT REMOVE: For handling Fork PRs see Pull Requests from Forks
    if: github.event_name == 'push'
    permissions:
      checks: write
    runs-on: [self-hosted, rust-builder]
    steps:
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: default
          override: true
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - uses: bencherdev/bencher@main
      - name: Run benchmark
        run: >
          bencher run
          --project backend-e9b5559-25k6lbjiv95d0
          --token '${{ secrets.BENCHER_API_TOKEN }}'
          --branch main
          --testbed hetzner-r3600
          --threshold-measure latency
          --threshold-test t_test
          --threshold-max-sample-size 64
          --threshold-upper-boundary 0.99
          --thresholds-reset
          --err
          --adapter rust_criterion
          --github-actions '${{ secrets.GITHUB_TOKEN }}'
          cargo bench
  deploy:
    name: Deploy to EKS
    needs: unit-test
    if: github.event_name == 'push'
    runs-on: [self-hosted, rust-builder]
    permissions:
      contents: read
    env:
      AWS_REGION: us-west-2
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
      EKS_CLUSTER: ${{ secrets.EKS_CLUSTER }}
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - name: Login to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION \
            | docker login --username AWS --password-stdin $ECR_REGISTRY
      - name: Build and push flow-server
        run: |
          IMAGE=$ECR_REGISTRY/flow-server:$IMAGE_TAG
          # Check if tag already exists (immutable tags enabled)
          if aws ecr describe-images --region $AWS_REGION \
               --repository-name flow-server \
               --image-ids imageTag=$IMAGE_TAG 2>/dev/null; then
            echo "Image tag $IMAGE_TAG already exists, skipping build+push."
          else
            docker build -f crates/flow-server/Dockerfile -t $IMAGE .
            docker push $IMAGE
          fi
      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --name $EKS_CLUSTER --region $AWS_REGION
      - name: Deploy flow-server
        run: |
          IMAGE=$ECR_REGISTRY/flow-server:$IMAGE_TAG
          kubectl set image statefulset/flow-server flow-server=$IMAGE
          kubectl rollout status statefulset/flow-server --timeout=300s
