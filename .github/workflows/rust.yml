name: Rust

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-test:
    if: ${{ ! contains(github.event.pull_request.labels.*.name, 'no-test') }}
    name: Unit test
    runs-on: [self-hosted, rust-builder]
    permissions:
      checks: write
      contents: read
    env:
      SOLANA_DEVNET_URL: ${{ secrets.SOLANA_DEVNET_URL }}
    steps:
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: default
          override: true
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
#      - uses: actions-rs/clippy-check@v1
#        with:
#          token: ${{ secrets.GITHUB_TOKEN }}
#          args: --quiet --tests --
      - run: >
          cargo clippy --quiet --tests --
          -D clippy::dbg_macro
          -D clippy::print_stdout
          -D clippy::print_stderr
          -D clippy::await_holding_refcell_ref
          -D clippy::await_holding_lock
      - name: Assert Cargo.lock unchanged
        run: .github/assert_cargo_lock_unchanged.bash
      - name: Build tests
        run: cargo test --quiet --no-run
      - name: Install deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Run tests
        run: cargo test -- --skip need_key_
      - name: cargo fmt
        run: cargo fmt --check 
  benchmark-pr:
    name: Benchmark PR
    needs: unit-test
    # DO NOT REMOVE: For handling Fork PRs see Pull Requests from Forks
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && contains(github.event.pull_request.labels.*.name, 'benchmark')
    permissions:
      pull-requests: write
    runs-on: [self-hosted, rust-builder]
    steps:
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: default
          override: true
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - uses: bencherdev/bencher@main
      - name: Run benchmark
        run: >
          bencher run
          --project backend-e9b5559-25k6lbjiv95d0
          --token '${{ secrets.BENCHER_API_TOKEN }}'
          --branch "$GITHUB_HEAD_REF"
          --start-point "$GITHUB_BASE_REF"
          --start-point-hash '${{ github.event.pull_request.base.sha }}'
          --start-point-clone-thresholds
          --start-point-reset
          --testbed ec2-c6a-2xlarge
          --err
          --adapter rust_criterion
          --github-actions '${{ secrets.GITHUB_TOKEN }}'
          cargo bench
  benchmark_main:
    name: Benchmark main
    needs: unit-test
    # Only runs when the 'benchmark' label is added to the merge commit's PR
    if: github.event_name == 'push' && contains(github.event.head_commit.message, '[benchmark]')
    permissions:
      checks: write
    runs-on: [self-hosted, rust-builder]
    steps:
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: default
          override: true
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - uses: bencherdev/bencher@main
      - name: Run benchmark
        run: >
          bencher run
          --project backend-e9b5559-25k6lbjiv95d0
          --token '${{ secrets.BENCHER_API_TOKEN }}'
          --branch main
          --testbed ec2-c6a-2xlarge
          --threshold-measure latency
          --threshold-test t_test
          --threshold-max-sample-size 64
          --threshold-upper-boundary 0.99
          --thresholds-reset
          --err
          --adapter rust_criterion
          --github-actions '${{ secrets.GITHUB_TOKEN }}'
          cargo bench
